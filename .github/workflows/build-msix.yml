name: Build and Package MSIX
on:
  push:
    branches: [ "main" ] # Nhánh chính chạy workflow
  workflow_dispatch: # Cho phép chạy thủ công từ tab Actions

jobs:
  build-msix:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── Cài đặt môi trường Node.js ──────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      # ─── Cài đặt môi trường Rust ───────────────────────────────────────────
      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'

      # ─── Cài đặt các dependencies node_modules ──────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ─── Biên dịch ứng dụng Tauri (không tạo installer mặc định) ───────────
      - name: Build Tauri App (no bundle)
        run: npm run tauri build -- --no-bundle

      # ─── Tạo thư mục staging và đóng gói thành file .msix bằng MakeAppx ──────
      - name: Package to MSIX
        run: |
          New-Item -ItemType Directory -Force -Path build
          New-Item -ItemType Directory -Force -Path msix_stage/src-tauri/icons
          Copy-Item AppxManifest.xml msix_stage/
          
          # Tìm file .exe trong các đường dẫn target release có thể có
          $exePath = ""
          if (Test-Path "src-tauri/target/release/woo-auto-printer.exe") {
            $exePath = "src-tauri/target/release/woo-auto-printer.exe"
          } elseif (Test-Path "src-tauri/target/x86_64-pc-windows-msvc/release/woo-auto-printer.exe") {
            $exePath = "src-tauri/target/x86_64-pc-windows-msvc/release/woo-auto-printer.exe"
          }
          
          if ($exePath -eq "") {
            Write-Error "ERROR: Could not find woo-auto-printer.exe in target directories!"
            exit 1
          }
          
          Write-Host "Found compiled executable at: $exePath"
          Copy-Item $exePath "msix_stage/The Auto Print.exe"
          
          Copy-Item src-tauri/icons/128x128.png msix_stage/src-tauri/icons/
          Copy-Item src-tauri/icons/32x32.png msix_stage/src-tauri/icons/
          
          $makeappxPath = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\10.*\x64\makeappx.exe" | Select-Object -First 1).FullName
          Write-Host "Found makeappx at: $makeappxPath"
          & $makeappxPath pack /d msix_stage /p build/woo-auto-printer.msix
        shell: powershell

      # ─── Ký số file MSIX (Chỉ cần thiết nếu cài đặt thủ công, Microsoft Store sẽ tự động ký khi upload) ───
      - name: Sign MSIX Package
        if: env.HAS_PFX == 'true'
        env:
          HAS_PFX: ${{ secrets.PFX_CERTIFICATE != '' }}
        run: |
          [System.IO.File]::WriteAllBytes("cert.pfx", [System.Convert]::FromBase64String("${{ secrets.PFX_CERTIFICATE }}"))
          $signtoolPath = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\10.*\x64\signtool.exe" | Select-Object -First 1).FullName
          Write-Host "Found signtool at: $signtoolPath"
          & $signtoolPath sign /fd sha256 /a /f cert.pfx /p "${{ secrets.PFX_PASSWORD }}" build/woo-auto-printer.msix
        shell: powershell

      # ─── Lưu trữ sản phẩm sau khi build xong ─────────────────────────────────
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: woo-auto-printer-msix
          path: build/woo-auto-printer.msix
